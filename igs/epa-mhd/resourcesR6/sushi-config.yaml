# The pages property corresponds to IG.definition.page. SUSHI can
# auto-generate the page list, but if the author includes pages in
# this file, it is assumed that the author will fully manage the
# pages section and SUSHI will not generate any page entries.
# The page file name is used as the key. If title is not provided,
# then the title will be generated from the file name.  If a
# generation value is not provided, it will be inferred from the
# file name extension.  Any subproperties that are valid filenames
# with supported extensions (e.g., .md/.xml) will be treated as
# sub-pages.
pages:
  index.md:
    title: Home
  general-principles.md:
    title: "Generelle Prinzipien"
  privacy-security.md:
    title: "Datenschutz und Sicherheit"
  Indexing.md:
    title: "Indizierung"
  InterfaceFindDocumentReferences.md:
    title: "Find Document References"
  InterfaceRetrieveDocument.md:
    title: "Retrieve Document"
  artifacts.md:
    title: "FHIR-Artefakte"
  referenced.md:
    title: "Referenzen"
  downloads.md:
    title: "Downloads"
  mhd-openapi.md:
    title: "OpenAPI: MHD Service"
  release-notes.md:
    title: "Release Notes"
  spec-sheet.md:
    title: "Anforderungslisten"
    actor-mhd.md:
      title: "Anforderungsliste: ePA MHD Service"
    actor-xds.md:
      title: "Anforderungsliste: ePA XDS Document Service"
    actor-client.md:
      title: "Anforderungsliste: ePA PS / ePA-Client-Systeme / ePA-FdV"
  comparisons.md:
    title: "Versionsvergleiche"
  license.md:
      title: "Apache License"

menu:
  Home: index.html
  Generelle Prinzipien:
    Generelle Prinzipien: general-principles.html
    Datenschutz und Sicherheit: privacy-security.html
    Indizierung: Indexing.html
  Schnittstellen:
    Find Document References: InterfaceFindDocumentReferences.html
    Retrieve Document: InterfaceRetrieveDocument.html
  FHIR-Artefakte: artifacts.html
  Anhänge:
    Referenzen: referenced.html
    Downloads: downloads.html
    OpenAPI: mhd-openapi.html
    Release Notes: release-notes.html
    Anforderungslisten: spec-sheet.html
    Versionsvergleiche: comparisons.html
    Lizenz: license.html

parameters:
  shownav: true
  apply-publisher: false
  default-publisher: true
  apply-contact: false
  default-contact: true
  no-usage-check: true
  excludettl: true
  apply-version: false
  default-version: true
  apply-copyright: false
  default-copyright: false
  # For which versions comparisons should be generated.
  #   {last} - compare with the last published version (whatever it's status)
  #              - this is the default if the parameter doesn't appear
  #   {current} - compare with the last full published version
  #   n/a - don't do any comparison
  #   [v] - a previous version where [v] is the version
  version-comparison:
    # There seem to be an problem when using this flag, maybe 1.1.1-ballot.1 causes issues?
    # - "{current}"
    - 1.0.1
    - 1.1.0
    - 1.1.1
  # excludemap: true
  no-narrative:
    # "StructureDefinition/*" doesn't seem to work anymore
    # - "StructureDefinition/*"
    - DocumentReference/*
    - Bundle/*
    - CapabilityStatement/*
    - "*/*"
  # noRootToc: true
  # autoload-resources: true
  path-resource:
    - fsh-generated/resources
    - extracted/resources
    - input/external-resources
  path-pages:
    - input/intro-notes
    - input/content
  special-url:
    - https://profiles.ihe.net/ITI/MHD/StructureDefinition/ihe-full-text-search-match-snippet
    - https://profiles.ihe.net/ITI/MHD/StructureDefinition/ihe-full-text-search-match-total-hits
  no-validate:
    - Bundle/example-fulltext-search-match

instanceOptions:
  # When set to true, slices must be referred to by name and not only by a numeric index in order to be used
  # in an Instance's assignment rule. All slices appear in the order in which they are specified in FSH rules.
  # While SUSHI defaults to false for legacy reasons, manualSliceOrding is recommended for new projects.
  manualSliceOrdering: true # true | false
  # Determines for which types of Instances SUSHI will automatically set meta.profile
  # if InstanceOf references a profile:
  # setMetaProfile: always # always | never | inline-only | standalone-only
  #
  # Determines for which types of Instances SUSHI will automatically set id
  # if InstanceOf references a profile:
  # setId: always # always | standalone-only

